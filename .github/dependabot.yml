version: 2

# Ziel: wöchentliche PRs für npm-Deps, monatlich für GitHub Actions.
# Gruppierung minimiert Noise (React-Familie, d3-Module etc. kommen gesammelt).
# Kritische Security-Patches werden separat sofort erstellt (GitHub-Default).

updates:
  - package-ecosystem: npm
    directory: /stadt-zuerich-next
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Zurich
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
      prefix-development: deps-dev
      include: scope
    groups:
      next-react:
        patterns:
          - next
          - react
          - react-dom
          - "@types/react*"
      d3:
        patterns:
          - "d3-*"
          - "@types/d3-*"
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
          - postcss
      cytoscape:
        patterns:
          - cytoscape
          - cytoscape-*
          - "@types/cytoscape"
      intl:
        patterns:
          - next-intl
      tooling:
        patterns:
          - typescript
          - "@types/node"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
