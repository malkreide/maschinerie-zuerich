name: Dependabot auto-merge

# Automatisiert das Mergen von Patch-/Minor-Dependabot-PRs, sobald CI grün ist.
# Major-Updates werden bewusst NICHT auto-gemerged (Breaking-Change-Risiko).
#
# Sicherheit: pull_request_target läuft im Kontext des base-Branches (main)
# mit Schreibrechten. Das ist für Dependabot OK, weil die Branches vom Bot
# im selben Repo liegen und nicht von Forks kommen. Der if-Guard auf
# 'dependabot[bot]' schliesst andere Autoren aus.

on:
  pull_request_target:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot-Metadata abrufen
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-Approve (Patch + Minor)
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL" --body "Auto-approved: $UPDATE_TYPE update of $DEPS"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          DEPS: ${{ steps.meta.outputs.dependency-names }}

      - name: Auto-Merge aktivieren (Patch + Minor)
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Major-Updates NICHT automatisch (Kommentar)
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: gh pr comment "$PR_URL" --body "⚠ Major-Update von ${DEPS}. Bitte manuell prüfen und Changelog ansehen, bevor gemerged wird."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPS: ${{ steps.meta.outputs.dependency-names }}
