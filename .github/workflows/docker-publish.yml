name: Publish Docker image

# Baut das Runtime-Image und pusht es zu GitHub Container Registry, damit
# andere Städte / Interessierte `docker run ghcr.io/.../maschinerie-zuerich`
# machen können ohne lokalen Build.
#
# Trigger:
#   - Push auf main (→ :latest, :main, :sha-xxxx)
#   - Tag-Push v*          (→ :v1.2.3, :1.2.3, :1.2, :1)
#   - Manuell via UI        (workflow_dispatch)
#
# Cache: GitHub Actions cache (type=gha) — hält Layer-Rebuilds unter ~1 min,
# solange sich package-lock.json nicht ändert.
#
# Multi-Arch: amd64 + arm64, damit auch M1/M2-Macs und Raspberry-Pi-ähnliche
# Server das Image ziehen können.

on:
  push:
    branches: [main]
    paths:
      - 'stadt-zuerich-next/**'
      - '.github/workflows/docker-publish.yml'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Maschinerie der Stadt Zürich
            org.opencontainers.image.description=Interaktive Visualisierung der Zürcher Stadtverwaltung
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./stadt-zuerich-next
          file: ./stadt-zuerich-next/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          # ignore-error=true: wenn das GHA-Cache-Backend 502 wirft (passiert
          # regelmässig bei grossen Multi-Arch-Caches), soll der erfolgreich
          # gepushte Image-Build nicht als Failure markiert werden. Cache ist
          # Speedup — nicht Korrektheit.
          cache-to: type=gha,mode=max,ignore-error=true
