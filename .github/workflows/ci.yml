name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  next-app:
    name: Next.js typecheck + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stadt-zuerich-next
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: stadt-zuerich-next/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  data-validation:
    name: org-chart.json + lebenslagen.json validieren
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stadt-zuerich-next
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
      # Die Prüfregeln leben in scripts/validate-lebenslagen.mjs (stdlib-only,
      # auch lokal via `npm run validate:lebenslagen` ausführbar). Früher war
      # dieselbe Logik als node -e-Heredoc hier eingebettet — zwei Wahrheiten,
      # die auseinanderdriften konnten.
      - name: Lebenslagen gegen Org-Chart + Prozessdaten prüfen
        run: node scripts/validate-lebenslagen.mjs

  schema-validation:
    name: OpenGov-Schemas validieren (Org-Chart + Prozesse)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stadt-zuerich-next
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: stadt-zuerich-next/package-lock.json
      - run: npm ci
      - name: org-chart.json gegen opengov-machinery-schema.json validieren
        run: npm run validate:org
        env:
          NO_COLOR: '1'
      - name: Schema + semantic validation für data/prozesse/**/*.json
        run: npm run validate:prozesse
        env:
          NO_COLOR: '1'
      - name: Portfolio-Aggregat synchron mit den Prozessdaten (Drift-Gate)
        run: npm run check:portfolio
        env:
          NO_COLOR: '1'
      - name: OpenAPI + Datenkatalog validieren
        run: npm run validate:catalog
      - name: Links in den Daten prüfen (strukturell)
        run: npm run check:links

  unit-tests:
    name: Unit-Tests (Bewertungs-Ableitung)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stadt-zuerich-next
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
      # Keine npm-Abhängigkeiten nötig: die reine Ableitungs-Funktion
      # importiert nur node:test + type-only Typen (Node-Type-Stripping).
      - run: npm run test:unit

  prozess-regression:
    name: Prozess-Daten Regression-Guard (i18n + description)
    # Braucht eine Basis-Version zum Vergleich → nur auf Pull Requests.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stadt-zuerich-next
    steps:
      - uses: actions/checkout@v7
        with:
          # Volle Historie, damit origin/<base> für den Vergleich verfügbar ist.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
      - name: Basis-Branch holen
        run: git fetch --no-tags origin "$GITHUB_BASE_REF"
      - name: Handgepflegte Texte gegen Basis schützen
        run: npm run check:regression
        env:
          NO_COLOR: '1'

  referenz-gate:
    name: Referenzen-Gate (Liveness + Verbatim für geänderte References)
    # Prüft nur die im PR neu hinzugefügten/geänderten References live gegen
    # ihre Quelle (toter Deep-Link bzw. source_quote nicht wörtlich auf der
    # Seite → Fehler). Bestandsdaten deckt der wöchentliche link-rot.yml ab.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stadt-zuerich-next
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
      - name: Basis-Branch holen
        run: git fetch --no-tags origin "$GITHUB_BASE_REF"
      - name: Neue/geänderte References live prüfen
        run: npm run check:refs
        env:
          NO_COLOR: '1'

  a11y:
    name: Accessibility (Playwright + axe-core)
    runs-on: ubuntu-latest
    # Sicherheitsnetz: hängende Schritte (z. B. ein nicht beendeter Server-
    # Prozess) sollen den Runner nicht bis zum 6h-Default blockieren.
    timeout-minutes: 20
    defaults:
      run:
        working-directory: stadt-zuerich-next
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: stadt-zuerich-next/package-lock.json
      - run: npm ci
      - name: Playwright-Browser installieren
        run: npx playwright install --with-deps chromium
      - name: Production-Build
        run: npm run build
      - name: Bundle-Budget der Startseite (First-Load JS)
        run: npm run check:bundle
      - name: a11y-Smoke (WCAG A/AA, serious+critical = Gate)
        run: npm run test:a11y
      - name: Playwright-Report hochladen
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: stadt-zuerich-next/playwright-report/
          retention-days: 7
