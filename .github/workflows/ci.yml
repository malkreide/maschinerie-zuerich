name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  next-app:
    name: Next.js typecheck + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stadt-zuerich-next
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: stadt-zuerich-next/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint --if-present

  data-validation:
    name: data.json + lebenslagen.json validieren
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Syntax-Check (JSON)
        run: |
          node -e "JSON.parse(require('fs').readFileSync('stadt-zuerich-next/data.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('stadt-zuerich-next/data/manual/lebenslagen.json','utf8'))"
      - name: Lebenslagen-IDs gegen data.json prüfen
        run: |
          node -e "
            const d = JSON.parse(require('fs').readFileSync('stadt-zuerich-next/data.json','utf8'));
            const l = JSON.parse(require('fs').readFileSync('stadt-zuerich-next/data/manual/lebenslagen.json','utf8'));
            const ids = new Set([...d.units.map(u=>u.id), ...d.departments.map(x=>x.id)]);
            const problems = [];
            for (const e of l.lebenslagen) {
              if (!ids.has(e.zustaendig)) problems.push(e.id + ': unbekannte zustaendig ' + e.zustaendig);
              if (!e.i18n?.de?.frage || !Array.isArray(e.i18n?.de?.stichworte)) problems.push(e.id + ': fehlt i18n.de.frage oder .stichworte');
            }
            if (problems.length) { console.error('Probleme:\n  ' + problems.join('\n  ')); process.exit(1); }
            console.log('✓ Alle ' + l.lebenslagen.length + ' Lebenslagen haben i18n.de und gültige zustaendig');
          "
