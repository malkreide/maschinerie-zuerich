name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  next-app:
    name: Next.js typecheck + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stadt-zuerich-next
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: npm
          cache-dependency-path: stadt-zuerich-next/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  data-validation:
    name: org-chart.json + lebenslagen.json validieren
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
      # Pfade spiegeln die data/zh/-Struktur (scaffold:city legt dieselbe
      # Form für jede weitere Stadt an). Früher lagen diese Dateien in
      # stadt-zuerich-next/data.json bzw. data/manual/lebenslagen.json —
      # der Job lief seitdem ins Leere. Siehe PR #29.
      - name: Syntax-Check (JSON)
        run: |
          node -e "JSON.parse(require('fs').readFileSync('stadt-zuerich-next/data/zh/org-chart.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('stadt-zuerich-next/data/zh/lebenslagen.json','utf8'))"
      - name: Lebenslagen-IDs gegen org-chart.json prüfen
        run: |
          node -e "
            const d = JSON.parse(require('fs').readFileSync('stadt-zuerich-next/data/zh/org-chart.json','utf8'));
            const l = JSON.parse(require('fs').readFileSync('stadt-zuerich-next/data/zh/lebenslagen.json','utf8'));
            const ids = new Set([
              d.center?.id,
              ...d.departments.map(x => x.id),
              ...d.units.map(u => u.id),
              ...(d.beteiligungen ?? []).map(b => b.id),
            ].filter(Boolean));
            const LOCALES = ['de','en','fr','it','ls'];
            const ZIELGRUPPEN = new Set(['einwohner','unternehmen','familie','alter','schule','migration','mobilitaet','wohnen','gesundheit']);
            const problems = [];
            for (const e of l.lebenslagen) {
              if (!ids.has(e.zustaendig)) problems.push(e.id + ': unbekannte zustaendig ' + e.zustaendig);
              if (!e.i18n?.de?.frage || !Array.isArray(e.i18n?.de?.stichworte)) problems.push(e.id + ': fehlt i18n.de.frage oder .stichworte');
              // zielgruppen (optional) müssen aus der bekannten Taxonomie stammen.
              if (e.zielgruppen !== undefined) {
                if (!Array.isArray(e.zielgruppen) || e.zielgruppen.length === 0) problems.push(e.id + ': zielgruppen muss ein nicht-leeres Array sein');
                else for (const z of e.zielgruppen) if (!ZIELGRUPPEN.has(z)) problems.push(e.id + ': unbekannte zielgruppe ' + z);
              }
              // Explizite Prozess-Verknüpfungen müssen auf vorhandene Verfahren zeigen.
              if (e.prozesse !== undefined) {
                if (!Array.isArray(e.prozesse)) problems.push(e.id + ': prozesse muss ein Array sein');
                else for (const slug of e.prozesse) {
                  if (!/^[a-z0-9-]+\/[a-z0-9-]+$/.test(slug)) { problems.push(e.id + ': ungueltiger prozess-slug ' + slug); continue; }
                  if (!require('fs').existsSync('stadt-zuerich-next/data/prozesse/' + slug + '.json')) problems.push(e.id + ': prozess-referenz ohne Datei: ' + slug);
                }
              }
              // Jede VORHANDENE (non-null) Locale muss vollständig sein —
              // verhindert kaputte Teilübersetzungen. Fehlt eine Locale ganz
              // (null/undefined), ist das ok: die Suche fällt auf de zurück.
              for (const loc of LOCALES) {
                const c = e.i18n?.[loc];
                if (c == null) continue;
                if (typeof c.frage !== 'string' || !c.frage.trim()) problems.push(e.id + '.' + loc + ': frage fehlt/leer');
                if (!Array.isArray(c.stichworte) || c.stichworte.length === 0) problems.push(e.id + '.' + loc + ': stichworte fehlen/leer');
              }
            }
            if (problems.length) { console.error('Probleme:\n  ' + problems.join('\n  ')); process.exit(1); }
            const counts = LOCALES.map(loc => loc + ':' + l.lebenslagen.filter(e => e.i18n?.[loc] != null).length).join(' ');
            console.log('✓ Alle ' + l.lebenslagen.length + ' Lebenslagen valide; Locale-Abdeckung ' + counts + ' (' + ids.size + ' bekannte IDs in org-chart)');
          "

  schema-validation:
    name: OpenGov-Schemas validieren (Org-Chart + Prozesse)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stadt-zuerich-next
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: npm
          cache-dependency-path: stadt-zuerich-next/package-lock.json
      - run: npm ci
      - name: org-chart.json gegen opengov-machinery-schema.json validieren
        run: npm run validate:org
        env:
          NO_COLOR: '1'
      - name: Schema + semantic validation für data/prozesse/**/*.json
        run: npm run validate:prozesse
        env:
          NO_COLOR: '1'
      - name: OpenAPI + Datenkatalog validieren
        run: npm run validate:catalog
      - name: Links in den Daten prüfen (strukturell)
        run: npm run check:links

  unit-tests:
    name: Unit-Tests (Bewertungs-Ableitung)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stadt-zuerich-next
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
      # Keine npm-Abhängigkeiten nötig: die reine Ableitungs-Funktion
      # importiert nur node:test + type-only Typen (Node-Type-Stripping).
      - run: npm run test:unit

  prozess-regression:
    name: Prozess-Daten Regression-Guard (i18n + description)
    # Braucht eine Basis-Version zum Vergleich → nur auf Pull Requests.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stadt-zuerich-next
    steps:
      - uses: actions/checkout@v6
        with:
          # Volle Historie, damit origin/<base> für den Vergleich verfügbar ist.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
      - name: Basis-Branch holen
        run: git fetch --no-tags origin "$GITHUB_BASE_REF"
      - name: Handgepflegte Texte gegen Basis schützen
        run: npm run check:regression
        env:
          NO_COLOR: '1'

  a11y:
    name: Accessibility (Playwright + axe-core)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stadt-zuerich-next
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: npm
          cache-dependency-path: stadt-zuerich-next/package-lock.json
      - run: npm ci
      - name: Playwright-Browser installieren
        run: npx playwright install --with-deps chromium
      - name: Production-Build
        run: npm run build
      - name: a11y-Smoke (WCAG A/AA, serious+critical = Gate)
        run: npm run test:a11y
      - name: Playwright-Report hochladen
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: stadt-zuerich-next/playwright-report/
          retention-days: 7
