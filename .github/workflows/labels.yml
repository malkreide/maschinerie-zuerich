name: Labels synchronisieren

# Synchronisiert die in .github/labels.yml deklarierten Labels nach GitHub.
# Nur anlegen/aktualisieren, nie löschen (skip-delete) — damit bestehende,
# nicht deklarierte Labels erhalten bleiben.

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
      - '.github/workflows/labels.yml'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    name: github-labeler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Labels aus .github/labels.yml synchronisieren
        uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml-file: .github/labels.yml
          skip-delete: true
          dry-run: false
