# Versioniertes Label-Set des Repos — Single Source of Truth.
#
# Wird vom Workflow .github/workflows/labels.yml nach GitHub synchronisiert
# (nur anlegen/aktualisieren, nie löschen). So bleiben Labels reproduzierbar
# und nachvollziehbar statt manuell gepflegt.
#
# Gruppen:
#   prio:*       — Priorität gemäss Strategieanalyse (P0 = Blocker/Integrität)
#   strategie:*  — Strategie-Bereich, auf den ein Issue einzahlt
#   status:*     — Spalte auf der öffentlichen Roadmap (/roadmap)
#   feedback:*   — Kategorie eines Bürger:innen-Feedbacks (Chip auf der Roadmap)
#   lang:*       — Sprache eines Feedbacks/Issues (Chip auf der Roadmap)
#   roadmap      — kuratierte Aufnahme ins öffentliche Roadmap-Board
#   (funktional) — bestehende Arbeits-Labels der Issue-Templates
#
# Die status:*/feedback:*/lang:*/roadmap-Labels werden von der öffentlichen
# Roadmap-Seite gelesen (siehe stadt-zuerich-next/lib/roadmap.ts): nur Issues
# mit feedback*/strategie:*/roadmap-Label erscheinen, status:* bestimmt die
# Spalte, feedback:*/lang:* die Chips. Datensparsam — keine Personendaten.

# ─── Priorität (Strategieanalyse) ───────────────────────────────────────────
- name: "prio:P0"
  color: "b60205"
  description: "Priorität 0 – Datenintegrität / Blocker"
- name: "prio:P1"
  color: "d93f0b"
  description: "Priorität 1 – Kernnutzen (Lebenslagen, Suche, a11y)"
- name: "prio:P2"
  color: "fbca04"
  description: "Priorität 2 – Ausbau (Open Data, Beteiligung)"

# ─── Strategie-Bereiche ─────────────────────────────────────────────────────
- name: "strategiebezug"
  color: "5319e7"
  description: "Bezieht sich auf ein Ziel/Empfehlung der Strategieanalyse (siehe Roadmap)"
- name: "strategie:datenintegritaet"
  color: "1d76db"
  description: "Datenqualität, Schema, Provenienz, keine unmarkierten Mockdaten"
- name: "strategie:lebenslagen"
  color: "1d76db"
  description: "Lebenslagen, Suche, Mehrsprachigkeit, Zielgruppen"
- name: "strategie:prozesse"
  color: "1d76db"
  description: "Verwaltungsprozesse, digitale Reife, Vereinfachung"
- name: "strategie:barrierefreiheit"
  color: "1d76db"
  description: "Accessibility / a11y-Gate"
- name: "strategie:open-data"
  color: "1d76db"
  description: "Offene APIs, Datenkatalog, Geodaten, Beteiligungen"
- name: "strategie:beteiligung"
  color: "1d76db"
  description: "Feedback, Mitwirkung, öffentliche Roadmap"
- name: "strategie:governance"
  color: "1d76db"
  description: "Prozesse, Labels, Templates, Beitrags-Governance"

